# Dashboard (Vite SPA) — HTTP; certbot adds TLS.

server {
    listen 80;
    listen [::]:80;
    server_name burqan.store www.burqan.store;

    root /var/www/burqan-store/packages/dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
