# One-time / emergency admin password reset on the VPS database.
# Do NOT commit passwords in the repo — set GitHub Actions secrets instead.
#
# Required secrets (same as deploy): VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH
# Additional secrets:
#   ADMIN_RESET_EMAIL — e.g. super@burqan.store
#   ADMIN_RESET_PASSWORD — new password (min 10 chars)
#
# Run: Actions → "Reset admin password (VPS)" → Run workflow

name: Reset admin password (VPS)

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ADMIN_RESET_EMAIL: ${{ secrets.ADMIN_RESET_EMAIL }}
          ADMIN_RESET_PASSWORD: ${{ secrets.ADMIN_RESET_PASSWORD }}
        run: |
          ok=0
          [[ -n "$VPS_HOST" ]] || { echo "::error::Missing VPS_HOST"; ok=1; }
          [[ -n "$VPS_USER" ]] || { echo "::error::Missing VPS_USER"; ok=1; }
          [[ -n "$VPS_SSH_KEY" ]] || { echo "::error::Missing VPS_SSH_KEY"; ok=1; }
          [[ -n "$DEPLOY_PATH" ]] || { echo "::error::Missing DEPLOY_PATH"; ok=1; }
          [[ -n "$ADMIN_RESET_EMAIL" ]] || { echo "::error::Missing ADMIN_RESET_EMAIL secret"; ok=1; }
          [[ -n "$ADMIN_RESET_PASSWORD" ]] || { echo "::error::Missing ADMIN_RESET_PASSWORD secret"; ok=1; }
          [[ ${#ADMIN_RESET_PASSWORD} -ge 10 ]] || { echo "::error::ADMIN_RESET_PASSWORD must be at least 10 characters"; ok=1; }
          exit "$ok"

      - name: Reset password on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          ADMIN_RESET_EMAIL: ${{ secrets.ADMIN_RESET_EMAIL }}
          ADMIN_RESET_PASSWORD: ${{ secrets.ADMIN_RESET_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ADMIN_RESET_EMAIL,ADMIN_RESET_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            export ADMIN_EMAIL="${ADMIN_RESET_EMAIL}"
            export ADMIN_PASSWORD="${ADMIN_RESET_PASSWORD}"
            npm run reset-admin -w @burqan/api
            echo "Admin password reset completed for ${ADMIN_RESET_EMAIL}"
