name: Deploy Burqan API

# Requires repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST      — server IP or DNS (e.g. 187.127.84.143)
#   VPS_USER      — SSH user (e.g. root or deploy)
#   VPS_SSH_KEY   — private key PEM (password auth is not used here)
#   DEPLOY_PATH   — e.g. /var/www/burqan-store
# Optional: VPS_SSH_PORT if not 22 (not wired below; add `port:` to ssh-action if needed)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check GitHub Actions secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ok=0
          [[ -n "$VPS_HOST" ]] || { echo "::error::Missing secret VPS_HOST — add it under Settings → Secrets and variables → Actions (your server IP or hostname, e.g. 187.127.84.143)"; ok=1; }
          [[ -n "$VPS_USER" ]] || { echo "::error::Missing secret VPS_USER — SSH login name (e.g. root or deploy)"; ok=1; }
          [[ -n "$VPS_SSH_KEY" ]] || { echo "::error::Missing secret VPS_SSH_KEY — full private SSH key PEM (starts with -----BEGIN ... PRIVATE KEY-----)"; ok=1; }
          [[ -n "$DEPLOY_PATH" ]] || { echo "::error::Missing secret DEPLOY_PATH — absolute path to the repo on the server (e.g. /var/www/burqan-store)"; ok=1; }
          exit "$ok"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build -w @burqan/api
            pm2 reload ecosystem.config.cjs --only burqan-api || pm2 start ecosystem.config.cjs --only burqan-api
