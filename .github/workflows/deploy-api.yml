name: Deploy Burqan API & Dashboard

# Secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH — required for SSH deploy
# Optional: VPS_SSH_PORT if not 22 (add port: to ssh-action if needed)
#
# Optional secrets (password is NOT stored in git — only in GitHub Secrets):
#   ADMIN_RESET_EMAIL — e.g. super@burqan.store
#   ADMIN_RESET_PASSWORD — new admin password (min 10 chars); applied on the VPS DB after each deploy
#   SUPER_ADMIN_EMAIL / SUPER_ADMIN_PASSWORD / SUPER_ADMIN_NAME — create or update a super admin once on deploy
#
# On the VPS, add SMTP + DASHBOARD_BASE_URL to packages/api/.env (not in git) for forgot-password email.
#
# Variables (Settings → Secrets and variables → Actions → Variables) — optional:
#   DASHBOARD_VITE_API_URL — e.g. https://api.burqan.store (writes packages/dashboard/.env.production before build)
#   DASHBOARD_VITE_QR_PAYLOAD_BASE_URL — e.g. https://burqan.store (optional; QR hints in admin UI)
# If DASHBOARD_VITE_API_URL is unset, the workflow reuses existing packages/dashboard/.env.production on the server
# (bootstrap creates it). If neither is set, the dashboard build step fails with a clear error.
#
# If SSH fails with "unable to authenticate … no supported methods remain", see infra/DEPLOY_VPS.md

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check GitHub Actions secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ok=0
          [[ -n "$VPS_HOST" ]] || { echo "::error::Missing secret VPS_HOST — add it under Settings → Secrets and variables → Actions (your server IP or hostname, e.g. 187.127.84.143)"; ok=1; }
          [[ -n "$VPS_USER" ]] || { echo "::error::Missing secret VPS_USER — SSH login name (e.g. root or deploy)"; ok=1; }
          [[ -n "$VPS_SSH_KEY" ]] || { echo "::error::Missing secret VPS_SSH_KEY — full private SSH key PEM (starts with -----BEGIN ... PRIVATE KEY-----)"; ok=1; }
          [[ -n "$DEPLOY_PATH" ]] || { echo "::error::Missing secret DEPLOY_PATH — absolute path to the repo on the server (e.g. /var/www/burqan-store)"; ok=1; }
          exit "$ok"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ADMIN_RESET_EMAIL: ${{ secrets.ADMIN_RESET_EMAIL }}
          ADMIN_RESET_PASSWORD: ${{ secrets.ADMIN_RESET_PASSWORD }}
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
          SUPER_ADMIN_NAME: ${{ secrets.SUPER_ADMIN_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ADMIN_RESET_EMAIL,ADMIN_RESET_PASSWORD,SUPER_ADMIN_EMAIL,SUPER_ADMIN_PASSWORD,SUPER_ADMIN_NAME
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build -w @burqan/api
            npm run migrate:all -w @burqan/api

            if [[ -n "${SUPER_ADMIN_EMAIL:-}" && -n "${SUPER_ADMIN_PASSWORD:-}" ]]; then
              export SUPER_ADMIN_EMAIL SUPER_ADMIN_PASSWORD
              export SUPER_ADMIN_NAME="${SUPER_ADMIN_NAME:-Super Admin}"
              npm run create-super-admin -w @burqan/api
              echo "Super admin upserted for ${SUPER_ADMIN_EMAIL}"
            fi

            pm2 reload ecosystem.config.cjs --only burqan-api --update-env || pm2 start ecosystem.config.cjs --only burqan-api

            if [[ -n "${ADMIN_RESET_EMAIL:-}" && -n "${ADMIN_RESET_PASSWORD:-}" ]]; then
              export ADMIN_EMAIL="${ADMIN_RESET_EMAIL}"
              export ADMIN_PASSWORD="${ADMIN_RESET_PASSWORD}"
              npm run reset-admin -w @burqan/api
              echo "Production admin password updated for ${ADMIN_RESET_EMAIL}"
            fi

            DASH_VITE_API='${{ vars.DASHBOARD_VITE_API_URL }}'
            DASH_VITE_QR='${{ vars.DASHBOARD_VITE_QR_PAYLOAD_BASE_URL }}'
            if [[ -n "${DASH_VITE_API}" ]]; then
              {
                echo "VITE_API_URL=${DASH_VITE_API}"
                if [[ -n "${DASH_VITE_QR}" ]]; then
                  echo "VITE_QR_PAYLOAD_BASE_URL=${DASH_VITE_QR}"
                fi
              } > packages/dashboard/.env.production
            elif ! grep -q '^VITE_API_URL=' packages/dashboard/.env.production 2>/dev/null; then
              echo "::error::Dashboard needs VITE_API_URL. Set Actions variable DASHBOARD_VITE_API_URL (e.g. https://api.burqan.store) or create packages/dashboard/.env.production on the server — see infra/DEPLOY_VPS.md"
              exit 1
            fi
            npm run build -w @burqan/dashboard
